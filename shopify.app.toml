# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "e55b8a0b1c2f6468ec27d5e9cdfecf8b"
name = "WishPilot"
application_url = "https://victorious-wishpilot-production.up.railway.app"
embedded = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products,read_customers,read_inventory"

[app_proxy]
url = "/api/wishlist"
subpath = "wish-pilot"
prefix = "apps"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [
  "https://victorious-wishpilot-production.up.railway.app/auth/callback",
  "https://victorious-wishpilot-production.up.railway.app/auth/shopify/callback",
  "https://victorious-wishpilot-production.up.railway.app/api/auth"
]

[build]
# Keep Partner Dashboard / app URLs on Railway forever.
# Temporary *.trycloudflare.com tunnels from `shopify app dev` must NOT overwrite them.
automatically_update_urls_on_dev = false
include_config_on_deploy = true
